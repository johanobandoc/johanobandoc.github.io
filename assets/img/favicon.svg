<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#0b3544"/>
  <!-- Subtle inner border for depth -->
  <rect x="4" y="4" width="92" height="92" rx="18" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1.5"/>
  <!-- O ring — represents the O in JO -->
  <circle cx="52" cy="43" r="26" fill="rgba(38,152,186,0.14)" stroke="#2698ba" stroke-width="6"/>
  <!-- J — stem threading through the O ring -->
  <line x1="52" y1="15" x2="52" y2="69" stroke="white" stroke-width="9" stroke-linecap="round"/>
  <!-- J — hook curving left below the ring -->
  <path d="M52 69 Q52 87 37 87 Q28 87 27 78"
        fill="none" stroke="white" stroke-width="9"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
